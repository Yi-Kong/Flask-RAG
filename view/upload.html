<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档上传</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a2e;
        }
        .upload-box {
            width: 460px;
            background: #16213e;
            padding: 40px 35px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .upload-box h2 {
            text-align: center;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 26px;
        }
        .upload-box .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .upload-box label {
            color: #ccc;
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
        }
        .upload-box input[type="text"] {
            width: 100%;
            height: 44px;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            outline: none;
            padding: 0 14px;
            color: #fff;
            font-size: 15px;
            border-radius: 4px;
            margin-bottom: 18px;
        }
        .upload-box input[type="text"]:focus {
            border-color: #e94560;
        }
        /* 自定义文件选择 */
        .file-area {
            position: relative;
            margin-bottom: 20px;
        }
        .file-area input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 120px;
            border: 2px dashed #334;
            border-radius: 6px;
            color: #666;
            font-size: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .file-label:hover, .file-label.has-file {
            border-color: #e94560;
            color: #e94560;
        }
        .file-label .icon { font-size: 36px; margin-right: 10px; }
        .upload-box button {
            width: 100%;
            height: 46px;
            background: #e94560;
            border: none;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .upload-box button:hover { background: #ff6b81; }
        .upload-box button:disabled { background: #555; cursor: not-allowed; }
        .msg {
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            margin-top: 16px;
            font-size: 14px;
            display: none;
        }
        .msg.success { display: block; background: #1a4a1a; color: #4caf50; }
        .msg.error   { display: block; background: #4a1a1a; color: #e94560; }
        .back-link {
            text-align: center;
            margin-top: 16px;
        }
        .back-link a {
            color: #888;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link a:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="upload-box">
        <h2>📄 文档上传</h2>
        <p class="subtitle">支持 PDF / Word / TXT / Markdown</p>

        <label>文档标题（可选）</label>
        <input type="text" id="titleInput" placeholder="留空则使用文件名">

        <label>选择文件</label>
        <div class="file-area">
            <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md,.markdown">
            <div class="file-label" id="fileLabel">
                <span class="icon">📁</span> 点击选择文件或拖拽到此处
            </div>
        </div>

        <button id="uploadBtn" onclick="doUpload()">上 传</button>

        <div class="msg" id="msg"></div>

        <div class="back-link">
            <a href="/">← 返回首页</a>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');  // DOM
        const fileLabel = document.getElementById('fileLabel');

        // 文件选择后更新显示
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileLabel.classList.add('has-file');
                fileLabel.innerHTML = '<span class="icon">📎</span>' + fileInput.files[0].name;
            } else {
                fileLabel.classList.remove('has-file');
                fileLabel.innerHTML = '<span class="icon">📁</span> 点击选择文件或拖拽到此处';
            }
        });

        function getCookie(name) {
            const value = '; ' + document.cookie;
            const parts = value.split('; ' + name + '=');
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'msg ' + type;
        }

        async function doUpload() {
            const file = fileInput.files[0];
            if (!file) {
                showMsg('请先选择文件', 'error');
                return;
            }

            const title = document.getElementById('titleInput').value.trim();
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = '上传中...';
            showMsg('', '');

            const formData = new FormData();
            formData.append('file', file);
            if (title) formData.append('title', title);

            try {
                const res = await fetch('/api/documents/upload', {
                    method: 'POST',
                    body: formData,
                    // cookie 自动携带
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    showMsg(
                        '✅ ' + data.message + '｜标题: ' + data.document.title + '｜状态: ' + data.document.status,
                        'success'
                    );
                    fileInput.value = '';
                    document.getElementById('titleInput').value = '';
                    fileLabel.classList.remove('has-file');
                    fileLabel.innerHTML = '<span class="icon">📁</span> 点击选择文件或拖拽到此处';
                } else {
                    showMsg('❌ ' + (data.message || data.msg || '上传失败'), 'error');
                }
            } catch (e) {
                showMsg('❌ 网络错误，请稍后重试', 'error');
            }

            btn.disabled = false;
            btn.textContent = '上 传';
        }
    </script>
</body>
</html>
