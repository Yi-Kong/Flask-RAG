<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a2e;
        }
        .login-box {
            width: 380px;
            background: #16213e;
            padding: 40px 35px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .login-box h2 {
            text-align: center;
            color: #e94560;
            margin-bottom: 30px;
            font-size: 26px;
        }
        .login-box input {
            width: 100%;
            height: 44px;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            outline: none;
            padding: 0 14px;
            color: #fff;
            font-size: 15px;
            border-radius: 4px;
            margin-bottom: 18px;
        }
        .login-box input:focus {
            border-color: #e94560;
        }
        .login-box button {
            width: 100%;
            height: 46px;
            background: #e94560;
            border: none;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .login-box button:hover {
            background: #ff6b81;
        }
        .flash-msg {
            background: #e94560;
            color: #fff;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .login-box .tip {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-top: 16px;
        }
        .login-box .tip a {
            color: #e94560;
            text-decoration: none;
        }
        .login-box .tip a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>用户登录</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash-msg">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="post">
            <input type="text" name="user" placeholder="用户名" required>
            <input type="password" name="pwd" placeholder="密码" required>
            <button type="submit">登 录</button>
        </form>
        <div class="tip">
            还没有账号？<a href="/register">去注册</a>
        </div>
    </div>
</body>
</html>
