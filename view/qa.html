<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答 - 校园知识库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
        }

        /* ── 左侧边栏 ── */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #16213e;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a1a4e;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #1a1a4e;
        }
        .sidebar-header h3 {
            color: #e94560;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .btn-new-chat {
            width: 100%;
            height: 40px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-new-chat:hover { background: #ff6b81; }
        .btn-new-chat:disabled { background: #555; cursor: not-allowed; }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .conversation-list .empty {
            text-align: center;
            color: #666;
            font-size: 13px;
            padding: 40px 0;
        }
        .conv-item {
            padding: 12px 14px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        .conv-item:hover { background: #0f3460; }
        .conv-item.active {
            background: #0f3460;
            border-color: #e94560;
        }
        .conv-item .conv-title {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .conv-item .conv-meta {
            font-size: 11px;
            color: #888;
            display: flex;
            justify-content: space-between;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid #1a1a4e;
        }
        .sidebar-footer a {
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .sidebar-footer a:hover { color: #e94560; }

        /* ── 主区域 ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .main-header {
            padding: 16px 24px;
            border-bottom: 1px solid #1a1a4e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #16213e;
        }
        .main-header h2 {
            font-size: 18px;
            color: #e94560;
        }
        .doc-selector select {
            height: 34px;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            color: #ccc;
            padding: 0 10px;
            border-radius: 4px;
            font-size: 13px;
            min-width: 180px;
        }
        .doc-selector select:focus { border-color: #e94560; outline: none; }

        /* ── 聊天区域 ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chat-welcome {
            text-align: center;
            color: #666;
            margin-top: 120px;
        }
        .chat-welcome .icon { font-size: 64px; margin-bottom: 16px; }
        .chat-welcome h3 { font-size: 22px; color: #888; margin-bottom: 8px; }
        .chat-welcome p { font-size: 14px; }

        /* ── 消息气泡 ── */
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }

        .message .role-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
            padding: 0 4px;
        }
        .message.user .role-label { text-align: right; }

        .message .bubble {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.7;
            word-break: break-word;
        }
        .message.user .bubble {
            background: #0f3460;
            color: #eee;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #1a2a3e;
            color: #ddd;
            border: 1px solid #1a1a4e;
            border-bottom-left-radius: 4px;
        }

        /* ── 来源引用 ── */
        .sources-box {
            margin-top: 10px;
            background: #111a28;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
        }
        .sources-box .sources-title {
            color: #e94560;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .source-item {
            padding: 8px 10px;
            margin-bottom: 6px;
            background: #0a1520;
            border-radius: 4px;
            border-left: 3px solid #e94560;
        }
        .source-item:last-child { margin-bottom: 0; }
        .source-item .src-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .source-item .src-doc {
            color: #ccc;
            font-weight: bold;
            font-size: 13px;
        }
        .source-item .src-meta {
            color: #777;
            font-size: 11px;
        }
        .source-item .src-content {
            color: #999;
            font-size: 12px;
            line-height: 1.6;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        /* ── 加载动画 ── */
        .loading-dots {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }
        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── 输入区域 ── */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid #1a1a4e;
            background: #16213e;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            height: 48px;
            max-height: 120px;
            background: #0f3460;
            border: 1px solid #1a1a4e;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            padding: 12px 16px;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .input-area textarea:focus { border-color: #e94560; }
        .input-area textarea::placeholder { color: #666; }
        .btn-send {
            width: 80px;
            height: 48px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .btn-send:hover { background: #ff6b81; }
        .btn-send:disabled { background: #555; cursor: not-allowed; }

        /* ── 错误提示 ── */
        .error-banner {
            background: #4a1a1a;
            color: #e94560;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .error-banner.show { display: block; }

        /* ── 响应式 ── */
        @media (max-width: 768px) {
            .sidebar { width: 220px; min-width: 220px; }
        }
    </style>
</head>
<body>

<!-- 左侧边栏：历史对话 -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h3>💬 对话列表</h3>
        <button class="btn-new-chat" onclick="newConversation()" id="btnNewChat">＋ 新建对话</button>
    </div>
    <div class="conversation-list" id="conversationList">
        <div class="empty">加载中...</div>
    </div>
    <div class="sidebar-footer">
        <a href="/">← 返回首页</a> &nbsp;|&nbsp;
        <a href="/upload">📄 上传文档</a>
    </div>
</aside>

<!-- 主区域 -->
<div class="main">
    <div class="main-header">
        <h2>🤖 校园智能问答</h2>
        <div class="doc-selector">
            <select id="docSelect" onchange="onDocChange()">
                <option value="">全部文档（不限范围）</option>
            </select>
        </div>
    </div>

    <div class="error-banner" id="errorBanner"></div>

    <div class="chat-area" id="chatArea">
        <div class="chat-welcome" id="chatWelcome">
            <div class="icon">📚</div>
            <h3>欢迎使用校园智能问答</h3>
            <p>在下方输入你的问题，AI 会从已上传的文档中查找答案</p>
        </div>
    </div>

    <div class="input-area">
        <textarea
            id="questionInput"
            placeholder="输入你的问题，例如：什么是数据库三级模式结构？"
            rows="1"
            onkeydown="onInputKeydown(event)"
        ></textarea>
        <button class="btn-send" onclick="sendQuestion()" id="btnSend">发 送</button>
    </div>
</div>

<script>
// ── 全局状态 ──
let currentConversationId = null;
let isLoading = false;

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', () => {
    loadConversations();
    loadDocuments();
});

// ── 加载文档列表到选择器 ──
async function loadDocuments() {
    try {
        const res = await fetch('/api/documents');
        const data = await res.json();
        const select = document.getElementById('docSelect');
        if (data.success && data.data) {
            data.data.forEach(doc => {
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = `${doc.title} (${doc.file_type})`;
                select.appendChild(opt);
            });
        }
    } catch (e) {
        console.error('加载文档列表失败:', e);
    }
}

// ── 加载对话列表 ──
async function loadConversations(activeId) {
    const listEl = document.getElementById('conversationList');
    try {
        const res = await fetch('/api/conversations');
        const data = await res.json();
        if (!data.success) {
            listEl.innerHTML = '<div class="empty">加载失败</div>';
            return;
        }
        const conversations = data.data || [];
        if (conversations.length === 0) {
            listEl.innerHTML = '<div class="empty">暂无对话<br>点击"新建对话"开始</div>';
            return;
        }
        listEl.innerHTML = conversations.map(c => {
            const activeClass = (c.id === (activeId || currentConversationId)) ? ' active' : '';
            const time = c.updated_at ? new Date(c.updated_at).toLocaleString('zh-CN') : '';
            return `
                <div class="conv-item${activeClass}" onclick="selectConversation(${c.id})" data-id="${c.id}">
                    <div class="conv-title">${escapeHtml(c.title)}</div>
                    <div class="conv-meta">
                        <span>${c.message_count} 条消息</span>
                        <span>${time}</span>
                    </div>
                </div>`;
        }).join('');
    } catch (e) {
        console.error('加载对话列表失败:', e);
        listEl.innerHTML = '<div class="empty">网络错误</div>';
    }
}

// ── 选择对话 ──
async function selectConversation(id) {
    currentConversationId = id;
    loadConversations(id);

    const chatArea = document.getElementById('chatArea');
    const welcome = document.getElementById('chatWelcome');
    chatArea.innerHTML = '';
    chatArea.appendChild(welcome);
    welcome.style.display = 'none';

    // 添加加载状态
    const loadingMsg = addMessage('assistant', '<div class="loading-dots"><span></span><span></span><span></span></div>', null, true);
    loadingMsg.querySelector('.role-label').textContent = '加载中';

    try {
        const res = await fetch(`/api/conversations/${id}`);
        const data = await res.json();
        if (!data.success) {
            showError(data.message || '加载对话失败');
            chatArea.removeChild(loadingMsg);
            return;
        }

        // 移除加载消息
        chatArea.removeChild(loadingMsg);

        // 渲染历史消息
        const messages = data.data.messages || [];
        if (messages.length === 0) {
            welcome.style.display = 'block';
            welcome.querySelector('h3').textContent = '开始新对话';
            welcome.querySelector('p').textContent = '在下方输入你的问题';
        } else {
            welcome.style.display = 'none';
            messages.forEach(m => {
                addMessage('user', m.question);
                addMessage('assistant', m.answer, m.sources || [], false, m.confidence);
            });
        }
    } catch (e) {
        showError('网络错误，请稍后重试');
        chatArea.removeChild(loadingMsg);
    }

    scrollToBottom();
}

// ── 新建对话 ──
async function newConversation() {
    if (isLoading) return;

    const title = prompt('对话标题（留空则为"新对话"）：', '');
    try {
        const res = await fetch('/api/conversations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title || '新对话' }),
        });
        const data = await res.json();
        if (data.success) {
            currentConversationId = data.data.id;
            loadConversations(data.data.id);

            // 清空聊天区域
            const chatArea = document.getElementById('chatArea');
            const welcome = document.getElementById('chatWelcome');
            chatArea.innerHTML = '';
            chatArea.appendChild(welcome);
            welcome.style.display = 'block';
            welcome.querySelector('h3').textContent = '新对话';
            welcome.querySelector('p').textContent = '在下方输入你的问题';

            document.getElementById('questionInput').focus();
        } else {
            showError(data.message || '创建对话失败');
        }
    } catch (e) {
        showError('网络错误，请稍后重试');
    }
}

// ── 发送问题 ──
async function sendQuestion() {
    if (isLoading) return;

    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    const docSelect = document.getElementById('docSelect');
    const documentId = docSelect.value ? parseInt(docSelect.value) : null;
    const topK = 5;

    // 禁用输入
    isLoading = true;
    input.disabled = true;
    document.getElementById('btnSend').disabled = true;
    document.getElementById('btnNewChat').disabled = true;
    hideError();

    // 显示用户问题
    const chatArea = document.getElementById('chatArea');
    document.getElementById('chatWelcome').style.display = 'none';
    addMessage('user', question);
    input.value = '';
    input.style.height = '48px';

    // 显示加载状态
    const loadingMsg = addMessage('assistant', '<div class="loading-dots"><span></span><span></span><span></span></div>', null, true);

    scrollToBottom();

    try {
        const res = await fetch('/api/qa/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question: question,
                conversation_id: currentConversationId,
                document_id: documentId,
                top_k: topK,
            }),
        });

        const data = await res.json();

        // 移除加载消息
        chatArea.removeChild(loadingMsg);

        if (data.success && res.ok) {
            const result = data.data;
            // 更新当前对话 ID（新建对话时）
            if (result.conversation_id && result.conversation_id !== currentConversationId) {
                currentConversationId = result.conversation_id;
            }
            // 显示回答和来源
            addMessage('assistant', result.answer, result.sources || [], false, result.confidence);
            // 刷新对话列表
            loadConversations(currentConversationId);
        } else {
            const errMsg = data.message || '请求失败，请稍后重试';
            showError(errMsg);
            addMessage('assistant', '❌ ' + errMsg);
        }
    } catch (e) {
        chatArea.removeChild(loadingMsg);
        showError('网络错误，请稍后重试');
        addMessage('assistant', '❌ 网络错误，请检查网络连接后重试');
    }

    // 恢复输入
    isLoading = false;
    input.disabled = false;
    document.getElementById('btnSend').disabled = false;
    document.getElementById('btnNewChat').disabled = false;
    input.focus();
    scrollToBottom();
}

// ── 在聊天区域添加消息 ──
// isHtml: 为 true 时 content 直接作为 HTML 渲染（用于加载动画等），
//          否则会经过 HTML 转义（防止 XSS）
function addMessage(role, content, sources, isHtml, confidence) {
    const chatArea = document.getElementById('chatArea');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'role-label';
    label.textContent = role === 'user' ? '我' : '🤖 AI 助手';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (isHtml) {
        bubble.innerHTML = content;
    } else {
        bubble.innerHTML = formatContent(content);
    }

    msgDiv.appendChild(label);

    // 添加可信度徽章（仅 assistant 消息）
    if (role === 'assistant' && confidence) {
        const badge = createConfidenceBadge(confidence);
        msgDiv.appendChild(badge);
    }

    msgDiv.appendChild(bubble);

    // 添加引用来源（仅 assistant 消息）
    if (role === 'assistant' && sources && sources.length > 0) {
        const sourcesBox = document.createElement('div');
        sourcesBox.className = 'sources-box';
        sourcesBox.innerHTML = `
            <div class="sources-title">📖 引用来源（共 ${sources.length} 条）</div>
            ${sources.map((s, i) => `
                <div class="source-item">
                    <div class="src-header">
                        <span class="src-doc">📄 ${escapeHtml(s.document_title || '未知文档')}</span>
                        <span class="src-meta">第 ${s.chunk_index ?? '?'} 块 · 相似度: ${((1 - (s.distance || 0)) * 100).toFixed(1)}%</span>
                    </div>
                    <div class="src-content">${escapeHtml((s.content || '').substring(0, 200))}${(s.content || '').length > 200 ? '...' : ''}</div>
                </div>
            `).join('')}
        `;
        msgDiv.appendChild(sourcesBox);
    }

    chatArea.appendChild(msgDiv);
    return msgDiv;
}

// ── 格式化内容（保留换行） ──
function formatContent(text) {
    if (!text) return '';
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

// ── HTML 转义 ──
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ── 可信度徽章 ──
function createConfidenceBadge(level) {
    const badges = {
        'high':    { text: '高可信度', sub: '资料库高度匹配',     color: '#4caf50', bg: '#1b3a1b', border: '#2e7d32' },
        'medium':  { text: '中可信度', sub: '资料库部分匹配',     color: '#ff9800', bg: '#3a2e1b', border: '#e65100' },
        'general': { text: '通用知识', sub: '资料库暂无依据，仅供参考', color: '#ff7043', bg: '#3a1b1b', border: '#bf360c' },
    };
    const badge = badges[level] || badges['general'];
    const el = document.createElement('div');
    el.style.cssText =
        'display:inline-block;font-size:11px;padding:3px 10px;border-radius:4px;margin-bottom:6px;' +
        'color:' + badge.color + ';background:' + badge.bg + ';border:1px solid ' + badge.border + ';';
    el.textContent = badge.text + ' · ' + badge.sub;
    return el;
}

// ── 键盘事件 ──
function onInputKeydown(e) {
    // Enter 发送，Shift+Enter 换行
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
    }
}

// ── 文档选择变更 ──
function onDocChange() {
    // 如果当前有对话，提示用户这是新的检索范围
    const select = document.getElementById('docSelect');
    if (select.value) {
        const opt = select.options[select.selectedIndex];
        // 不强制提示，静默切换
    }
}

// ── 滚动到底部 ──
function scrollToBottom() {
    const chatArea = document.getElementById('chatArea');
    setTimeout(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
    }, 100);
}

// ── 错误提示 ──
function showError(msg) {
    const banner = document.getElementById('errorBanner');
    banner.textContent = '⚠️ ' + msg;
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 5000);
}

function hideError() {
    document.getElementById('errorBanner').classList.remove('show');
}
</script>
</body>
</html>
